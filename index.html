<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>GAP26 &#8212; Trip Checklist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <div class="road-scene">
      <div class="mountains"></div>
      <div class="road"></div>
      <div class="car-driver">
        <div class="car-container">
          <div class="car">
            <div class="roofbox"></div>
            <div class="body">
              <div class="cabin"></div>
              <div class="rear-window"></div>
              <div class="front-window"></div>
            </div>
            <div class="wheel wheel-front"><div class="hub"></div></div>
            <div class="wheel wheel-rear"><div class="hub"></div></div>
            <div class="headlight"></div>
            <div class="taillight"></div>
            <div class="exhaust">
              <span class="puff p1"></span>
              <span class="puff p2"></span>
              <span class="puff p3"></span>
            </div>
          </div>
        </div>
      </div>
      <div class="road-lines"></div>
    </div>
    <h1>GAP26</h1>
    <p class="subtitle">Summer Trip Checklist</p>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" role="tab" data-list="road" aria-selected="true">
      <span class="tab-icon">&#x1F697;</span>
      <span class="tab-label">Road Prep</span>
    </button>
    <button class="tab" role="tab" data-list="croatia" aria-selected="false">
      <span class="tab-icon">&#x1F3D6;&#xFE0F;</span>
      <span class="tab-label">Croatia</span>
    </button>
    <button class="tab" role="tab" data-list="kosova" aria-selected="false">
      <span class="tab-icon">&#x26F0;&#xFE0F;</span>
      <span class="tab-label">Kosova</span>
    </button>
  </nav>

  <main>
    <section class="checklist-panel active" data-panel="road">
      <form class="add-form" data-list="road">
        <input type="text" placeholder="Add a road prep item&#8230;" autocomplete="off" required>
        <button type="submit" aria-label="Add item">+</button>
      </form>
      <ul class="items" data-items="road"></ul>
      <div class="checked-divider" data-divider="road" hidden>
        <span>Completed</span>
      </div>
      <ul class="items checked-items" data-checked="road"></ul>
    </section>

    <section class="checklist-panel" data-panel="croatia">
      <form class="add-form" data-list="croatia">
        <input type="text" placeholder="Add a Croatia item&#8230;" autocomplete="off" required>
        <button type="submit" aria-label="Add item">+</button>
      </form>
      <ul class="items" data-items="croatia"></ul>
      <div class="checked-divider" data-divider="croatia" hidden>
        <span>Completed</span>
      </div>
      <ul class="items checked-items" data-checked="croatia"></ul>
    </section>

    <section class="checklist-panel" data-panel="kosova">
      <form class="add-form" data-list="kosova">
        <input type="text" placeholder="Add a Kosova item&#8230;" autocomplete="off" required>
        <button type="submit" aria-label="Add item">+</button>
      </form>
      <ul class="items" data-items="kosova"></ul>
      <div class="checked-divider" data-divider="kosova" hidden>
        <span>Completed</span>
      </div>
      <ul class="items checked-items" data-checked="kosova"></ul>
    </section>
  </main>

  <footer>
    <p>Granit, Adelina &amp; Priam <span class="heart">&#x2665;</span> Summer 2026</p>
  </footer>

  <div id="toast" class="toast" hidden></div>

  <!-- Firebase SDK (compat, from CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
